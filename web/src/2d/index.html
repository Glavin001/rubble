<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubble - 2D Physics Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      font-family: monospace;
      font-size: 14px;
      color: #aaa;
      pointer-events: none;
      line-height: 1.6;
    }
    #info {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      color: #666;
      pointer-events: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, sans-serif;
      font-size: 1.2rem;
      color: #888;
      z-index: 10;
    }
    a { color: #ff6b35; text-decoration: none; }
  </style>
</head>
<body>
  <div id="loading">Initializing WebGPU physics engine...</div>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="fps">FPS: --</div>
    <div id="bodies">Bodies: --</div>
    <pre id="timings"></pre>
  </div>
  <div id="info">Click to spawn bodies &middot; <a href="../../index.html" style="pointer-events: auto;">Back</a></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
