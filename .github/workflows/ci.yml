name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Override rust-toolchain.toml (pinned to nightly for spirv-builder)
  RUSTUP_TOOLCHAIN: stable

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Mesa lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests
        env:
          WGPU_BACKEND: vulkan
        run: |
          # Find the lavapipe ICD file (name varies by distro/version)
          LVP_ICD=$(find /usr/share/vulkan/icd.d -name 'lvp_icd*' 2>/dev/null | head -1)
          if [ -n "$LVP_ICD" ]; then
            export VK_ICD_FILENAMES="$LVP_ICD"
          fi
          cargo nextest run --workspace --profile ci
      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Mesa lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers
      - run: cargo clippy --workspace --all-targets -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build WASM package
        run: wasm-pack build crates/rubble-wasm --target web --out-dir ../../web/src/wasm
      - name: Install web dependencies
        run: cd web && npm ci
      - name: Type-check TypeScript
        run: cd web && npx tsc --noEmit
      - name: Build web project
        run: cd web && npx vite build
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  e2e:
    name: E2E Tests (Playwright + SwiftShader)
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: cd web && npm ci
      - name: Install Playwright Chromium
        run: cd web && npx playwright install chromium
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - name: Run Playwright tests
        env:
          CI: "true"
        run: cd web && npx playwright test --reporter=line
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: web/test-results/
